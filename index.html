<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lector QR + Google Sheets</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
background: linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
font-family: 'Segoe UI', sans-serif;
}

.tarjeta{
border:none;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
overflow:hidden;
}

.encabezado{
background: linear-gradient(90deg,#2563eb,#1d4ed8);
color:white;
padding:25px;
text-align:center;
}

.encabezado h1{
font-size:2rem;
font-weight:700;
margin:0;
}

#reader{
width:100% !important;
max-width:360px;
margin:auto;
border-radius:15px;
overflow:hidden;
}

.mensaje{
display:none;
font-weight:600;
border-radius:12px;
padding:12px;
}

.tabla-scroll{
overflow-x:auto;
}

table{
white-space:nowrap;
}

.badge-estado{
font-size:.85rem;
padding:8px 12px;
border-radius:20px;
}

.btn-modern{
border-radius:12px;
padding:10px 20px;
font-weight:600;
}

footer{
color:#cbd5e1;
font-size:.9rem;
text-align:center;
margin-top:20px;
}

@media(max-width:768px){

.encabezado h1{
font-size:1.5rem;
}

.card-body{
padding:15px;
}

}

</style>
</head>

<body>

<div class="container py-4">

<div class="card tarjeta">

<div class="encabezado">
<h1>📷 Lector de QR SALES</h1>
<p class="mb-0 mt-2">Escaneo inteligente desde celular</p>
</div>

<div class="card-body p-4">

<div id="mensaje" class="mensaje alert"></div>

<div class="row g-4">

<div class="col-lg-5 text-center">
<div id="reader"></div>

<div class="d-grid gap-2 mt-3">
<button onclick="limpiarTabla()" class="btn btn-danger btn-modern">
🗑 Limpiar Tabla
</button>

<button onclick="cargarDatosHoja()" class="btn btn-primary btn-modern">
🔄 Recargar Datos
</button>
</div>
</div>

<div class="col-lg-7">

<div class="tabla-scroll">
<table class="table table-hover table-striped align-middle">

<thead class="table-dark">
<tr>
<th>Fecha</th>
<th>Código</th>
<th>Fabricación</th>
<th>Vencimiento</th>
<th>Lote</th>
<th>Estado</th>
</tr>
</thead>

<tbody id="tabla"></tbody>

</table>
</div>

</div>

</div>

</div>

</div>

<footer class="mt-4">
Laboratorio Pyam
</footer>

</div>

<script>

//=====================================

const urlHoja = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT3RThSxFZqY3Eo3y7OvpbsrFY7uaY-HN4ppiH3g9xXpRBE9NYtDlii5JJsrLqe5rv7sAY7O_s8GlFK/pub?output=xlsx";

let codigosExistentes = [];
let ultimoQR = "";

// =====================================
// MENSAJES
// =====================================

function mostrarMensaje(texto,tipo){

let div = document.getElementById("mensaje");

div.className = "mensaje alert";

if(tipo==="exito") div.classList.add("alert-success");
if(tipo==="error") div.classList.add("alert-danger");
if(tipo==="info") div.classList.add("alert-info");

div.innerText = texto;
div.style.display = "block";

setTimeout(()=>{
div.style.display = "none";
},2500);

}

// =====================================
// CARGAR DATOS
// =====================================

async function cargarDatosHoja(){

try{

mostrarMensaje("Cargando datos de Google Sheets...","info");

const respuesta = await fetch(urlHoja);
const texto = await respuesta.text();

const filas = texto.split("\n").slice(1);

codigosExistentes = filas.map(fila=>{
let columnas = fila.split(",");
return columnas[1]?.trim();
}).filter(x=>x);

mostrarMensaje("Datos cargados correctamente","exito");

}catch(error){

mostrarMensaje("Error al cargar hoja","error");

}

}

// =====================================
// ESCANEO QR
// =====================================

function alEscanearQR(textoLeido){

if(textoLeido === ultimoQR) return;

ultimoQR = textoLeido;

setTimeout(()=>{
ultimoQR = "";
},3000);

let datos = textoLeido.split("|");

if(datos.length < 4){
mostrarMensaje("QR inválido","error");
return;
}

let codigo = datos[0].trim();
let fabricacion = datos[1].trim();
let vencimiento = datos[2].trim();
let lote = datos[3].trim();

let existe = codigosExistentes.includes(codigo);

agregarFila(codigo,fabricacion,vencimiento,lote,existe);

if(existe){
mostrarMensaje("Código duplicado","error");
}else{
mostrarMensaje("Código nuevo","exito");
}

}

// =====================================
// TABLA
// =====================================

function agregarFila(codigo,fab,vto,lote,existe){

let fecha = new Date().toLocaleString();

document.getElementById("tabla").innerHTML += `
<tr>
<td>${fecha}</td>
<td>${codigo}</td>
<td>${fab}</td>
<td>${vto}</td>
<td>${lote}</td>
<td>
<span class="badge ${existe ? 'bg-danger' : 'bg-success'} badge-estado">
${existe ? 'Duplicado' : 'Nuevo'}
</span>
</td>
</tr>
`;

}

function limpiarTabla(){
document.getElementById("tabla").innerHTML = "";
mostrarMensaje("Tabla limpiada","info");
}

// =====================================
// INICIAR ESCANER
// =====================================

function iniciarEscaner(){

let escaner = new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
},
false
);

escaner.render(alEscanearQR);

// traducir botones internos

setTimeout(()=>{

let boton = document.querySelector("#reader button");
if(boton){
boton.innerText = "Permitir Cámara";
boton.classList.add("btn","btn-primary","w-100");
}

let link = document.querySelector("#reader__scan_region a");
if(link){
link.innerText = "Escanear Imagen";
}

},1000);

}

// =====================================
// INICIO
// =====================================

cargarDatosHoja();
iniciarEscaner();

</script>

</body>
</html>
